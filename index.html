<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Page</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1115;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .grid {
      width: min(92vw, 1100px);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: center;
      gap: 2vw;
    }

    .tile {
      width: 20vw;
      height: 20vw;
      max-width: 220px;
      max-height: 220px;
      min-width: 120px;
      min-height: 120px;
      display: grid;
      place-items: center;
      background: #1a1f29;
      border: 1px solid #2a3140;
      border-radius: 2rem;
      text-decoration: none;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-4px);
      background: #222938;
      border-color: #4b5a78;
      outline: none;
    }

    .tile svg {
      width: 52%;
      height: 52%;
      fill: #f5f7fb;
    }

    @media (min-width: 900px) {
      .grid {
        max-width: calc((20vw * 4) + (2vw * 3));
      }
    }
  </style>
</head>
<body>
  <main class="grid" aria-label="Start page links">
    <a class="tile" href="https://www.youtube.com" aria-label="YouTube">
      <svg viewBox="0 0 24 24" aria-hidden="true">

      </svg>
    </a>

    <a class="tile" href="https://mail.zoho.eu/zm/#mail/folder/inbox" aria-label="Zoho Mail">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M2 5.5A2.5 2.5 0 0 1 4.5 3h15A2.5 2.5 0 0 1 22 5.5v13a2.5 2.5 0 0 1-2.5 2.5h-15A2.5 2.5 0 0 1 2 18.5v-13Zm2 .4v.2l8 5.7 8-5.7v-.2a.5.5 0 0 0-.5-.5h-15a.5.5 0 0 0-.5.5Zm16 2.6-7.4 5.2a1 1 0 0 1-1.2 0L4 8.5v10a.5.5 0 0 0 .5.5h15a.5.5 0 0 0 .5-.5v-10Z"/>
      </svg>
    </a>

    <a class="tile" href="https://github.com/thousandbrainsproject/tbp.monty/pulls/TimothyAlexisVass" aria-label="Thousand Brains Project pull requests">
      <img src="https://github.com/thousandbrainsproject.png" alt="" style="width:60%;height:60%;object-fit:contain;border-radius:12px;" />
    </a>

  </main>
</body>
</html>
